
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShreeCloud | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .glow { text-shadow: 0 0 20px #3b82f6; }
    </style>
</head>
<body class="p-6">
    <nav class="max-w-6xl mx-auto flex justify-between items-center py-6">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter">SHREECLOUD</h1>
        <div class="flex gap-4">
            <span id="status" class="bg-red-500/20 text-red-500 px-4 py-1 rounded-full text-sm font-bold border border-red-500/50">Bot Offline</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-20 text-center">
        <h2 class="text-6xl font-extrabold mb-4 glow">Master Your Server.</h2>
        <p class="text-gray-400 text-xl mb-12">The most reliable moderation & automation tool powered by ShreeCloud.</p>

        <div class="grid md:grid-cols-2 gap-6 max-w-2xl mx-auto">
            <div class="glass p-8 rounded-3xl">
                <p class="text-gray-500 text-sm uppercase font-bold">Servers Connected</p>
                <p id="servers" class="text-4xl font-black mt-2">0</p>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-gray-500 text-sm uppercase font-bold">Total Users</p>
                <p id="users" class="text-4xl font-black mt-2">0</p>
            </div>
        </div>

        <div class="mt-12 flex justify-center gap-4">
            <a href="YOUR_INVITE_LINK" class="bg-blue-600 px-10 py-4 rounded-2xl font-bold hover:bg-blue-500 transition">Invite to Server</a>
            <button onclick="alert('Feature coming soon!')" class="glass px-10 py-4 rounded-2xl font-bold">Documentation</button>
        </div>
    </main>

    <script>
        async function loadStats() {
            try {
                const res = await fetch('http://localhost:5000/api/stats');
                const data = await res.json();
                
                document.getElementById('servers').innerText = data.servers;
                document.getElementById('users').innerText = data.users;
                
                const statusBtn = document.getElementById('status');
                statusBtn.innerText = "Bot Online";
                statusBtn.className = "bg-green-500/20 text-green-500 px-4 py-1 rounded-full text-sm font-bold border border-green-500/50";
            } catch (e) {
                console.log("Bot not running yet...");
            }
        }
        setInterval(loadStats, 5000);
        loadStats();
    </script>
</body>
</html>
